name: UI Tests

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: UI Tests
    timeout-minutes: 80
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@95d85449e4f3f352e261221f6529f8ed307f5728 # v1

      - name: Set up browser cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/pw-browsers
          key: ${{ runner.os }}-${{ hashFiles('ui-tests/yarn.lock') }}

      - name: Install jupyterlab
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Install extension
        run: python -m pip install -e .

      - name: Install dependencies
        run: |
          jlpm install
          cd ui-tests
          jlpm install

      - name: Launch JupyterLab
        run: |
          cd ui-tests
          jlpm start &

      - name: Install browser and build extension
        run: |
          jlpm run build
          cd ui-tests
          jlpm playwright install chromium

      - name: Wait for JupyterLab to be ready
        run: npx wait-on@7.2.0 http-get://localhost:8888/lab -t 360000

      - name: Run UI Tests
        run: |
          cd ui-tests
          jlpm test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: ui-tests/test-results
